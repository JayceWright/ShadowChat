<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow-Net Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <div class="input-container" style="margin-bottom: 10px;">
            <span class="prompt">Username: </span>
            <input type="text" id="username-input" class="chat-input" placeholder="Guest" autocomplete="off">
        </div>
        <div id="chat-logs" class="chat-logs"></div>
        <div class="input-container">
            <span class="prompt" id="cli-prompt">Guest@shadow-net:~$ </span>
            <input type="text" id="chat-input" class="chat-input" autofocus autocomplete="off">
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
